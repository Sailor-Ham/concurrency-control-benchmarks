name: concurrency-control-benchmarks

x-was-healthcheck: &was-healthcheck
  test:
    [
      "CMD-SHELL",
      "wget -q --spider http://localhost:8080/actuator/health || exit 1",
    ]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  # Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      was1:
        condition: service_healthy
      was2:
        condition: service_healthy
    networks:
      - concurrency-control-network
    restart: no

  # WAS#1
  was1:
    build: .
    container_name: was1
    environment:
      - SPRING_PROFILES_ACTIVE=bench
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JAVA_OPTS=-Xms768m -Xmx768m
      - TZ=Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - concurrency-control-network
    healthcheck: *was-healthcheck
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
    restart: no

  # WAS#2
  was2:
    build: .
    container_name: was2
    environment:
      - SPRING_PROFILES_ACTIVE=bench
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JAVA_OPTS=-Xms768m -Xmx768m
      - TZ=Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - concurrency-control-network
    healthcheck: *was-healthcheck
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1024M
    restart: no

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=Asia/Seoul
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=1000
    networks:
      - concurrency-control-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: no

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: redis
    environment:
      - TZ=Asia/Seoul
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    networks:
      - concurrency-control-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: no

networks:
  concurrency-control-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
