name: concurrency-control-benchmarks

x-was-healthcheck: &was-healthcheck
  test:
    [
      "CMD-SHELL",
      "wget -q --spider http://localhost:8080/actuator/health || exit 1",
    ]
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  # Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      was1:
        condition: service_healthy
      was2:
        condition: service_healthy
    networks:
      - concurrency-control-network
    restart: no

  # WAS#1
  was1:
    build: .
    container_name: was1
    environment:
      - SPRING_PROFILES_ACTIVE=bench
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JAVA_OPTS=-Xms1536m -Xmx1536m
      - TZ=Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    networks:
      - concurrency-control-network
    healthcheck: *was-healthcheck
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
    restart: no

  # WAS#2
  was2:
    build: .
    container_name: was2
    environment:
      - SPRING_PROFILES_ACTIVE=bench
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JAVA_OPTS=-Xms1536m -Xmx1536m
      - TZ=Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    networks:
      - concurrency-control-network
    healthcheck: *was-healthcheck
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
    restart: no

  # MySQL
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - TZ=Asia/Seoul
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=1000
    networks:
      - concurrency-control-network
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: no

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: redis
    environment:
      - TZ=Asia/Seoul
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD}",
      ]
    networks:
      - concurrency-control-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: no

  # Zookeeper
  zookeeper:
    image: zookeeper:3.9
    container_name: zookeeper
    environment:
      - ZOO_MY_ID=1
      - ZOO_PORT=2181
      - TZ=Asia/Seoul
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    networks:
      - concurrency-control-network
    restart: no
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # nGrinder Controller
  ngrinder-controller:
    platform: linux/amd64
    image: ngrinder/controller:3.5.9-p1
    container_name: ngrinder-controller
    environment:
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8 -Djava.security.egd=file:/dev/./urandom
      - TZ=Asia/Seoul
      - NGRINDER_HOME=/opt/ngrinder-controller
    ports:
      - "${NGRINDER_CONTROLLER_PORT}:80"
      - "${NGRINDER_AGENT_PORT}:16001"
      - "12000-12009:12000-12009"
    volumes:
      - ngrinder_controller_data:/opt/ngrinder-controller
    networks:
      - concurrency-control-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: no

  # nGrinder Agent
  ngrinder-agent:
    platform: linux/amd64
    image: ngrinder/agent:3.5.9-p1
    container_name: ngrinder-agent
    command: ngrinder-controller:80
    environment:
      - GRINDER_AGENT_JVM_OPTS=-Xms4g -Xmx4g
    deploy:
      resources:
        limits:
          memory: 8G
    depends_on:
      ngrinder-controller:
        condition: service_healthy
    networks:
      - concurrency-control-network
    restart: no

networks:
  concurrency-control-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  ngrinder_controller_data:
